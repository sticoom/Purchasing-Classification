<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提货计划处理系统 - 字段严格排序版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background-color: #f8f9fa; padding: 40px; color: #2c3e50; }
        .card { max-width: 900px; margin: auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        h2 { color: #1a73e8; display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .file-box { background: #fdfdfd; border: 2px dashed #e0e0e0; padding: 30px; border-radius: 10px; margin-bottom: 25px; }
        .input-item { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        input[type="file"] { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #1a73e8; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { background: #1557b0; box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #status { margin-top: 25px; padding: 15px; border-radius: 8px; display: none; font-size: 14px; }
        .success { background: #e6f4ea; color: #1e7e34; }
        .error { background: #fce8e6; color: #d93025; }
        .list-info { font-size: 12px; color: #7f8c8d; margin-top: 20px; background: #f1f3f4; padding: 15px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📦 供应商分发工具</h2>
    
    <div class="file-box">
        <div class="input-item">
            <label>1. 提货计划表 (主数据)</label>
            <input type="file" id="planFile" accept=".xlsx, .xls, .csv">
        </div>
        <div class="input-item">
            <label>2. 采购订单追踪表 (匹配库)</label>
            <input type="file" id="orderFile" accept=".xlsx, .xls, .csv">
        </div>
    </div>

    <button id="runBtn">生成并下载结果 (ZIP)</button>

    <div id="status"></div>

    <div class="list-info">
       
</div>

<script>
    // 定义截图中的目标字段和顺序
    const TARGET_HEADERS = [
        "单据编号", "版本单号", "国家", "SKU", "SKU名称", 
        "FNSKU", "供应商", "装箱数", "订单状态", "提货数量", 
        "已关联送货数量", "提货未入库数量", "已入库数量", 
        "关联送货单", "提货状态", "计划备注", "计划发货时间"
    ];

    const runBtn = document.getElementById('runBtn');
    const statusBox = document.getElementById('status');

    function notify(msg, type = 'success') {
        statusBox.style.display = "block";
        statusBox.className = type === 'success' ? "success" : "error";
        statusBox.innerHTML = msg;
    }

    function calculateDate(version) {
        if (!version || version.length < 10) return "❌";
        try {
            const y = parseInt("20" + version.substring(4, 6));
            const m = parseInt(version.substring(6, 8));
            const d = parseInt(version.substring(8, 10));
            let dt = new Date(y, m - 1, d);
            if (isNaN(dt.getTime())) return "❌";
            dt.setDate(dt.getDate() - 5);
            return `${dt.getMonth() + 1}月${dt.getDate()}日`;
        } catch(e) { return "❌"; }
    }

    async function parseExcel(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
            };
            reader.readAsArrayBuffer(file);
        });
    }

    // 将原始行数据映射为仅包含目标字段的有序对象
    function mapToTargetFields(row, supplierName, planDate) {
        const newRow = {};
        TARGET_HEADERS.forEach(header => {
            if (header === "供应商") {
                newRow[header] = supplierName;
            } else if (header === "计划发货时间") {
                newRow[header] = planDate;
            } else {
                newRow[header] = row[header] || ""; // 直接从原行提取
            }
        });
        return newRow;
    }

    runBtn.addEventListener('click', async () => {
        const f1 = document.getElementById('planFile').files[0];
        const f2 = document.getElementById('orderFile').files[0];

        if(!f1 || !f2) return alert("请先上传两份报表");

        runBtn.disabled = true;
        notify("⏳ 正在根据 SKU 匹配供应商并调整字段顺序...");

        try {
            const planRows = await parseExcel(f1);
            const orderRows = await parseExcel(f2);

            // 建立 SKU -> 供应商 Map (考虑去重)
            const skuToSuppliers = new Map();
            orderRows.forEach(r => {
                const sku = String(r['SKU'] || '').trim();
                const sup = String(r['供应商'] || '').trim();
                if(sku && sup) {
                    if(!skuToSuppliers.has(sku)) skuToSuppliers.set(sku, new Set());
                    skuToSuppliers.get(sku).add(sup);
                }
            });

            const supplierGroups = {};
            const multiList = [];
            const noMatchList = [];

            planRows.forEach(row => {
                const sku = String(row['SKU'] || '').trim();
                const supSet = skuToSuppliers.get(sku);
                const planDate = calculateDate(row['版本单号']);

                if (!supSet || supSet.size === 0) {
                    noMatchList.push(mapToTargetFields(row, "该SKU已无在途订单", planDate));
                } else if (supSet.size > 1) {
                    const combinedName = Array.from(supSet).join('、');
                    multiList.push(mapToTargetFields(row, combinedName, planDate));
                } else {
                    const supName = Array.from(supSet)[0];
                    if (!supplierGroups[supName]) supplierGroups[supName] = [];
                    supplierGroups[supName].push(mapToTargetFields(row, supName, planDate));
                }
            });

            // 打包
            const zip = new JSZip();
            
            // 正常分发文件
            Object.keys(supplierGroups).forEach(name => {
                const ws = XLSX.utils.json_to_sheet(supplierGroups[name], { header: TARGET_HEADERS });
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "提货明细");
                const out = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
                zip.file(`${name}.xlsx`, out);
            });

            // 异常汇总文件
            const errWb = XLSX.utils.book_new();
            if(multiList.length) XLSX.utils.book_append_sheet(errWb, XLSX.utils.json_to_sheet(multiList, { header: TARGET_HEADERS }), "注意⚠️多个供应商");
            if(noMatchList.length) XLSX.utils.book_append_sheet(errWb, XLSX.utils.json_to_sheet(noMatchList, { header: TARGET_HEADERS }), "未匹配SKU");
            
            const errOut = XLSX.write(errWb, { type: 'array', bookType: 'xlsx' });
            zip.file("异常数据汇总.xlsx", errOut);

            const blob = await zip.generateAsync({ type: "blob" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `提货计划结果_${new Date().toISOString().slice(0,10)}.zip`;
            a.click();

            notify("✅ 处理完毕！字段已按照 A-Q 列顺序排列，请查看下载的 ZIP 包。");
        } catch (e) {
            notify("❌ 出错了：" + e.message, 'error');
        } finally {
            runBtn.disabled = false;
        }
    });
</script>

</body>
</html>
