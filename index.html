<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨境电商提货计划匹配系统 - 增强版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background-color: #f0f2f5; padding: 40px; color: #333; }
        .card { max-width: 850px; margin: auto; background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h2 { color: #1a73e8; margin-top: 0; border-left: 5px solid #1a73e8; padding-left: 15px; }
        .file-group { background: #f8f9fa; border: 2px dashed #d1d5db; padding: 25px; border-radius: 10px; margin: 25px 0; }
        .file-input-wrapper { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 10px; color: #444; }
        input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: white; }
        button { background: #1a73e8; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { background: #1557b0; transform: translateY(-1px); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 25px; padding: 15px; border-radius: 8px; display: none; }
        .success { background: #e6f4ea; color: #1e7e34; border: 1px solid #c3e6cb; }
        .error { background: #fce8e6; color: #d93025; border: 1px solid #f5c6cb; }
        .rules-note { font-size: 13px; color: #666; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 提货计划 - 供应商自动分发系统</h2>
    <div class="rules-note">
        <strong>核心逻辑确认：</strong><br>
        • <b>不聚合逻辑</b>：提货计划表中的每一行都会保留，绝不合并 SKU。<br>
        • <b>唯一供应商</b>：若采购表中某 SKU 对应多个记录但厂家名一致，视为单一供应商。
    </div>

    <div class="file-group">
        <div class="file-input-wrapper">
            <label>1. 提货计划表 (Master)</label>
            <input type="file" id="planFile" accept=".xlsx, .xls, .csv">
        </div>
        <div class="file-input-wrapper">
            <label>2. 采购订单追踪表 (Matching)</label>
            <input type="file" id="orderFile" accept=".xlsx, .xls, .csv">
        </div>
    </div>

    <button id="runBtn">分析数据并导出 ZIP 包</button>
    <div id="status"></div>
</div>

<script>
    const runBtn = document.getElementById('runBtn');
    const statusBox = document.getElementById('status');

    function showStatus(msg, isError = false) {
        statusBox.style.display = "block";
        statusBox.className = isError ? "error" : "success";
        statusBox.innerHTML = msg;
    }

    // 日期计算逻辑：倒推5天
    function getOffsetDate(version) {
        if (!version || version.length < 10) return "❌";
        try {
            const y = parseInt("20" + version.substring(4, 6));
            const m = parseInt(version.substring(6, 8));
            const d = parseInt(version.substring(8, 10));
            let dt = new Date(y, m - 1, d);
            if (isNaN(dt.getTime())) return "❌";
            dt.setDate(dt.getDate() - 5);
            return `${dt.getMonth() + 1}月${dt.getDate()}日`;
        } catch(e) { return "❌"; }
    }

    async function parseExcel(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
            };
            reader.readAsArrayBuffer(file);
        });
    }

    runBtn.addEventListener('click', async () => {
        const f1 = document.getElementById('planFile').files[0];
        const f2 = document.getElementById('orderFile').files[0];

        if(!f1 || !f2) return alert("请先上传两个文件！");

        runBtn.disabled = true;
        showStatus("⏳ 正在进行精确匹配...");

        try {
            const planRows = await parseExcel(f1);
            const orderRows = await parseExcel(f2);

            // 第一步：预处理采购表，获取 SKU 对应的唯一供应商集合
            const skuToSuppliers = new Map();
            orderRows.forEach(r => {
                const s = String(r['SKU'] || '').trim();
                const v = String(r['供应商'] || '').trim();
                if(s && v) {
                    if(!skuToSuppliers.has(s)) skuToSuppliers.set(s, new Set());
                    skuToSuppliers.get(s).add(v);
                }
            });

            const supplierFiles = {}; // 存放 1对1 数据
            const multiList = [];      // 存放多供应商异常
            const noMatchList = [];    // 存放无匹配异常

            // 第二步：遍历提货计划表（不改变行数，不聚合）
            planRows.forEach(row => {
                const sku = String(row['SKU'] || '').trim();
                const supSet = skuToSuppliers.get(sku);
                
                // 增加计算列
                row['计划发货时间'] = getOffsetDate(row['版本单号']);

                if (!supSet || supSet.size === 0) {
                    row['供应商'] = "该SKU已无在途订单";
                    noMatchList.push({...row});
                } else if (supSet.size > 1) {
                    row['供应商'] = Array.from(supSet).join('、');
                    multiList.push({...row});
                } else {
                    const supName = Array.from(supSet)[0];
                    row['供应商'] = supName;
                    if (!supplierFiles[supName]) supplierFiles[supName] = [];
                    // 这里直接 push 原始行，确保了提货计划表有多少行，结果里就有多少行
                    supplierFiles[supName].push({...row});
                }
            });

            // 第三步：生成文件
            const zip = new JSZip();
            
            // 供应商独立文件
            Object.keys(supplierFiles).forEach(sName => {
                const ws = XLSX.utils.json_to_sheet(supplierFiles[sName]);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "数据清单");
                const out = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
                zip.file(`${sName}.xlsx`, out);
            });

            // 异常文件
            const errWb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(errWb, XLSX.utils.json_to_sheet(multiList), "注意⚠️存在多个供应商");
            XLSX.utils.book_append_sheet(errWb, XLSX.utils.json_to_sheet(noMatchList), "该SKU已无在途订单");
            const errOut = XLSX.write(errWb, { type: 'array', bookType: 'xlsx' });
            zip.file("异常情况汇总.xlsx", errOut);

            const blob = await zip.generateAsync({ type: "blob" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `提货处理结果_${new Date().toISOString().slice(0,10)}.zip`;
            a.click();

            showStatus("✅ 匹配完成！所有原始行已保留并按供应商分发。");
        } catch (e) {
            showStatus("❌ 发生错误：" + e.message, true);
        } finally {
            runBtn.disabled = false;
        }
    });
</script>

</body>
</html>
